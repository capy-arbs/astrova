<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Astrova — CapyForge Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
    canvas { image-rendering: pixelated; }

    #game-wrapper { position: relative; }

    /* DOM HUD overlay — allows clicks to pass through EXCEPT on interactive children */
    #hud-overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 100;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff; overflow: hidden;
    }

    #hud-top-left { position: absolute; top: 12px; left: 16px; }
    #hud-top-right { position: absolute; top: 12px; right: 16px; text-align: right; }

    .hud-bar { display: flex; align-items: center; margin-bottom: 4px; }
    .hud-bar-label { font-size: 12px; font-weight: 700; width: 50px; text-shadow: 1px 1px 2px #000; }
    .hud-bar-bg { width: 160px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; position: relative; }
    .hud-bar-fill { height: 100%; border-radius: 3px; transition: width 0.2s; }
    .hud-bar-fill.hp { background: #22cc44; }
    .hud-bar-fill.shield { background: #4488ff; }
    .hud-bar-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; text-shadow: 1px 1px 1px #000; }

    #hud-location { font-size: 13px; font-weight: 600; color: #aabbcc; text-shadow: 1px 1px 2px #000; }
    #hud-credits { font-size: 12px; color: #ddcc44; margin-top: 4px; text-shadow: 1px 1px 2px #000; }

    #float-container { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .float-text {
      position: absolute; font-size: 14px; font-weight: 700;
      text-shadow: 1px 1px 2px #000;
      white-space: nowrap; transform: translate(-50%, -100%);
      animation: float-up 1s ease-out forwards;
      pointer-events: none;
    }
    @keyframes float-up {
      0% { opacity: 1; transform: translate(-50%, -100%); }
      100% { opacity: 0; transform: translate(-50%, calc(-100% - 40px)); }
    }

    /* ── Mobile touch controls ────────────────────────────────────────── */
    #touch-controls {
      display: none; /* hidden on desktop, shown via JS on touch devices */
      position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 150;
    }
    .touch-zone {
      position: absolute; pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }
    /* Joystick area — bottom left */
    #joystick-zone {
      left: 10px; bottom: 10px; width: 140px; height: 140px;
    }
    #joystick-base {
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
      position: absolute; left: 10px; bottom: 10px;
    }
    #joystick-thumb {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.3);
      position: absolute; left: 48px; bottom: 48px;
      transform: translate(-50%, 50%);
      transition: none;
    }
    /* Action buttons — bottom right */
    .touch-btn {
      position: absolute; pointer-events: auto;
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7);
      -webkit-tap-highlight-color: transparent;
    }
    #btn-fire { right: 20px; bottom: 80px; background: rgba(255,50,50,0.2); border: 2px solid rgba(255,80,80,0.3); }
    #btn-action { right: 90px; bottom: 40px; background: rgba(50,150,255,0.2); border: 2px solid rgba(80,150,255,0.3); }
    #btn-inv { right: 20px; bottom: 150px; background: rgba(200,200,50,0.15); border: 2px solid rgba(200,200,80,0.25); font-size: 10px; width: 44px; height: 44px; }
    .touch-btn:active { filter: brightness(1.5); }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="hud-overlay">
      <div id="hud-top-left">
        <div class="hud-bar">
          <span class="hud-bar-label" style="color:#44ee66">HULL</span>
          <div class="hud-bar-bg"><div class="hud-bar-fill hp" id="hp-fill" style="width:100%"></div><div class="hud-bar-text" id="hp-text">100/100</div></div>
        </div>
        <div class="hud-bar">
          <span class="hud-bar-label" style="color:#6699ff">SHIELD</span>
          <div class="hud-bar-bg"><div class="hud-bar-fill shield" id="shield-fill" style="width:100%"></div><div class="hud-bar-text" id="shield-text">50/50</div></div>
        </div>
      </div>
      <div id="hud-top-right">
        <div id="hud-location">Deep Space</div>
        <div id="hud-credits">Credits: 0</div>
      </div>
      <div id="float-container"></div>
    </div>

    <!-- Mobile touch controls -->
    <div id="touch-controls">
      <div id="joystick-zone" class="touch-zone">
        <div id="joystick-base"></div>
        <div id="joystick-thumb"></div>
      </div>
      <div id="btn-fire" class="touch-btn">FIRE</div>
      <div id="btn-action" class="touch-btn">E</div>
      <div id="btn-inv" class="touch-btn">INV</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="src/gamestate.js"></script>
  <script src="src/scenes/FlightScene.js"></script>
  <script src="src/scenes/PlanetScene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
